specVersion: "4.0"
metadata:
  name: customerindent
type: application
server:
  customMiddleware:
    - name: custom-proxy-middleware
      afterMiddleware: compression
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: true
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: customerindent
        ui5Theme: sap_fiori_3

---
specVersion: "4.0"
kind: extension
type: server-middleware
metadata:
  name: custom-proxy-middleware
middleware:
  path: ./custom-proxy-middleware.js
